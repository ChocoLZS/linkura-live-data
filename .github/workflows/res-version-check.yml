name: Resource Version Check

permissions:
  contents: write

on:
  workflow_dispatch:  # 允许手动触发
    inputs:
      dry_run:
        description: 'Dry run mode (skip commit/upload/notification)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  check-res-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version-check.outputs.new_version }}
      update_type: ${{ steps.version-check.outputs.update_type }}
      client_version: ${{ steps.version-check.outputs.client_version }}
      res_version: ${{ steps.version-check.outputs.res_version }}
      ios_res_version: ${{ steps.version-check.outputs.ios_res_version }}
      old_client_version: ${{ steps.version-check.outputs.old_client_version }}
      old_res_version: ${{ steps.version-check.outputs.old_res_version }}
      old_ios_res_version: ${{ steps.version-check.outputs.old_ios_res_version }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y curl
    
    - name: Run resource version check
      id: version-check
      run: |
        cd scripts
        chmod +x handle_res_version.sh
        
        # 获取更新前的状态
        OLD_RES_VERSION=""
        OLD_IOS_RES_VERSION=""
        OLD_CLIENT_VERSION=""
        if [ -f "../data/res_version.txt" ]; then
          OLD_RES_VERSION=$(head -n 1 ../data/res_version.txt)
          echo "脚本运行前 - OLD_RES_VERSION: [$OLD_RES_VERSION]"
        fi
        if [ -f "../data/res_ios_version.txt" ]; then
          OLD_IOS_RES_VERSION=$(head -n 1 ../data/res_ios_version.txt)
          echo "脚本运行前 - OLD_IOS_RES_VERSION: [$OLD_IOS_RES_VERSION]"
        fi
        if [ -f "../others/linkura-googleplay-apk.csv" ]; then
          OLD_CLIENT_VERSION=$(head -2 ../others/linkura-googleplay-apk.csv | tail -1 | cut -d',' -f2)
          echo "脚本运行前 - OLD_CLIENT_VERSION: [$OLD_CLIENT_VERSION]"
        fi
        
        # 运行版本检查脚本
        if ./handle_res_version.sh; then
          echo "new_version=true" >> $GITHUB_OUTPUT
          
          # 获取更新后的版本信息
          NEW_RES_VERSION=$(head -n 1 ../data/res_version.txt)
          NEW_CLIENT_VERSION=$(head -2 ../others/linkura-googleplay-apk.csv | tail -1 | cut -d',' -f2)
          NEW_IOS_RES_VERSION=$(head -n 1 ../data/res_ios_version.txt)
          
          # 确定更新类型
          UPDATE_TYPE=""
          CLIENT_CHANGED=false
          RES_CHANGED=false
          IOS_RES_CHANGED=false
          [ "$OLD_CLIENT_VERSION" != "$NEW_CLIENT_VERSION" ] && CLIENT_CHANGED=true
          [ "$OLD_RES_VERSION" != "$NEW_RES_VERSION" ] && RES_CHANGED=true
          [ "$OLD_IOS_RES_VERSION" != "$NEW_IOS_RES_VERSION" ] && IOS_RES_CHANGED=true

          if $CLIENT_CHANGED && ($RES_CHANGED || $IOS_RES_CHANGED); then
            UPDATE_TYPE="client+res"
            echo "检测到客户端版本更新: $OLD_CLIENT_VERSION -> $NEW_CLIENT_VERSION"
            echo "检测到资源版本更新: $OLD_RES_VERSION -> $NEW_RES_VERSION"
          elif $CLIENT_CHANGED; then
            UPDATE_TYPE="client"
            echo "检测到客户端版本更新: $OLD_CLIENT_VERSION -> $NEW_CLIENT_VERSION"
          elif $RES_CHANGED || $IOS_RES_CHANGED; then
            UPDATE_TYPE="res"
            $RES_CHANGED && echo "检测到Android资源版本更新: $OLD_RES_VERSION -> $NEW_RES_VERSION"
            $IOS_RES_CHANGED && echo "检测到iOS资源版本更新: $OLD_IOS_RES_VERSION -> $NEW_IOS_RES_VERSION"
          else
            UPDATE_TYPE="unknown"
          fi
          
          # 输出变量
          echo "update_type=$UPDATE_TYPE" >> $GITHUB_OUTPUT
          echo "client_version=$NEW_CLIENT_VERSION" >> $GITHUB_OUTPUT
          echo "res_version=$NEW_RES_VERSION" >> $GITHUB_OUTPUT
          echo "ios_res_version=$NEW_IOS_RES_VERSION" >> $GITHUB_OUTPUT
          echo "old_client_version=$OLD_CLIENT_VERSION" >> $GITHUB_OUTPUT
          echo "old_res_version=$OLD_RES_VERSION" >> $GITHUB_OUTPUT
          echo "old_ios_res_version=$OLD_IOS_RES_VERSION" >> $GITHUB_OUTPUT
          
        else
          echo "new_version=false" >> $GITHUB_OUTPUT
          echo "没有检测到版本更新"
        fi
    
    - name: Configure Git
      if: steps.version-check.outputs.new_version == 'true' && github.event.inputs.dry_run != 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
    
    - name: Get the current date time
      id: datetime
      if: steps.version-check.outputs.new_version == 'true'
      run: echo "time_now=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
    
    - name: Generate commit message
      if: steps.version-check.outputs.new_version == 'true'
      id: commit-msg
      run: |
        UPDATE_TYPE="${{ steps.version-check.outputs.update_type }}"
        CLIENT_VER="${{ steps.version-check.outputs.client_version }}"
        RES_VER="${{ steps.version-check.outputs.res_version }}"
        OLD_CLIENT_VER="${{ steps.version-check.outputs.old_client_version }}"
        OLD_RES_VER="${{ steps.version-check.outputs.old_res_version }}"
        DATETIME="${{ steps.datetime.outputs.time_now }}"
        
        case "$UPDATE_TYPE" in
          "client+res")
            MSG="feat: update client v${CLIENT_VER} + resource ${RES_VER} (${DATETIME})"
            ;;
          "client")
            MSG="feat: update client version ${OLD_CLIENT_VER} -> ${CLIENT_VER} (${DATETIME})"
            ;;
          "res")
            MSG="feat: update resource version ${OLD_RES_VER} -> ${RES_VER} (${DATETIME})"
            ;;
          *)
            MSG="feat: version update (${DATETIME})"
            ;;
        esac
        
        echo "commit_message=${MSG}" >> $GITHUB_OUTPUT
        echo "生成的提交信息: ${MSG}"

    - name: Commit and push changes
      if: steps.version-check.outputs.new_version == 'true' && github.event.inputs.dry_run != 'true'
      uses: EndBug/add-and-commit@v9
      with:
        default_author: github_actions
        message: '${{ steps.commit-msg.outputs.commit_message }}'
        add: |
          - data/res_version.txt
          - data/res_ios_version.txt
          - others/linkura-googleplay-apk.csv
          - data/client-res.json
          - data/client-ios-res.json

    - name: Dry run summary
      if: steps.version-check.outputs.new_version == 'true' && github.event.inputs.dry_run == 'true'
      run: |
        echo "🧪 **Dry Run 模式**" >> $GITHUB_STEP_SUMMARY
        echo "本次不会提交代码、不会上传 R2、不会发送真实通知。" >> $GITHUB_STEP_SUMMARY
        echo "预期提交信息: \`${{ steps.commit-msg.outputs.commit_message }}\`" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
    
    - name: Create summary
      run: |
        # 获取当前版本信息
        CURRENT_CLIENT_VER=""
        CURRENT_RES_VER=""
        CURRENT_IOS_RES_VER=""
        if [ -f "others/linkura-googleplay-apk.csv" ]; then
          CURRENT_CLIENT_VER=$(head -2 others/linkura-googleplay-apk.csv | tail -1 | cut -d',' -f2)
        fi
        if [ -f "data/res_version.txt" ]; then
          CURRENT_RES_VER=$(head -n 1 data/res_version.txt)
        fi
        if [ -f "data/res_ios_version.txt" ]; then
          CURRENT_IOS_RES_VER=$(head -n 1 data/res_ios_version.txt)
        fi
        
        # 始终显示当前版本信息
        echo "📊 **当前版本信息**" >> $GITHUB_STEP_SUMMARY
        echo "🔄 客户端版本: ${CURRENT_CLIENT_VER:-未知}" >> $GITHUB_STEP_SUMMARY
        echo "📦 Android 资源版本: ${CURRENT_RES_VER:-未知}" >> $GITHUB_STEP_SUMMARY
        echo "🍎 iOS 资源版本: ${CURRENT_IOS_RES_VER:-未知}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.version-check.outputs.new_version }}" == "true" ]; then
          UPDATE_TYPE="${{ steps.version-check.outputs.update_type }}"
          CLIENT_VER="${{ steps.version-check.outputs.client_version }}"
          RES_VER="${{ steps.version-check.outputs.res_version }}"
          IOS_RES_VER="${{ steps.version-check.outputs.ios_res_version }}"
          OLD_CLIENT_VER="${{ steps.version-check.outputs.old_client_version }}"
          OLD_RES_VER="${{ steps.version-check.outputs.old_res_version }}"
          OLD_IOS_RES_VER="${{ steps.version-check.outputs.old_ios_res_version }}"
          
          echo "🎉 **检测到版本更新**" >> $GITHUB_STEP_SUMMARY
          case "$UPDATE_TYPE" in
            "client+res")
              echo "🔄 客户端: ${OLD_CLIENT_VER} → ${CLIENT_VER}" >> $GITHUB_STEP_SUMMARY
              echo "📦 Android 资源: ${OLD_RES_VER} → ${RES_VER}" >> $GITHUB_STEP_SUMMARY
              echo "🍎 iOS 资源: ${OLD_IOS_RES_VER} → ${IOS_RES_VER}" >> $GITHUB_STEP_SUMMARY
              ;;
            "client")
              echo "🔄 客户端: ${OLD_CLIENT_VER} → ${CLIENT_VER}" >> $GITHUB_STEP_SUMMARY
              ;;
            "res")
              [ "$OLD_RES_VER" != "$RES_VER" ] && echo "📦 Android 资源: ${OLD_RES_VER} → ${RES_VER}" >> $GITHUB_STEP_SUMMARY
              [ "$OLD_IOS_RES_VER" != "$IOS_RES_VER" ] && echo "🍎 iOS 资源: ${OLD_IOS_RES_VER} → ${IOS_RES_VER}" >> $GITHUB_STEP_SUMMARY
              ;;
            *)
              echo "✅ 检测到版本更新" >> $GITHUB_STEP_SUMMARY
              ;;
          esac
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "🧪 Dry Run：未提交仓库变更（仅预览）" >> $GITHUB_STEP_SUMMARY
          else
            echo "📝 已提交更新到仓库" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "ℹ️ **没有检测到版本更新**" >> $GITHUB_STEP_SUMMARY
        fi

  auto-upload:
    runs-on: ubuntu-latest
    needs: check-res-version
    if: ${{ success() && needs.check-res-version.outputs.new_version == 'true' && github.event.inputs.dry_run != 'true' }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: 'main'
        fetch-depth: 2  # 需要获取前两个提交来比较差异
    
    - name: Setup Python and dependencies
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    
    - name: Install Python dependencies
      run: pip install requests
    
    - name: Upload client-res.json to R2
      env:
        R2_BUCKET: ${{ secrets.R2_BUCKET }}
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      run: |
        # 使用linkura-motion-cli工具上传client-res.json
        TOOL_URL="https://github.com/ChocoLZS/linkura-cli/releases/download/linkura-motion-cli-v1.1.0/linkura-motion-cli-x86_64-unknown-linux-musl.tar.gz"
        TOOL_NAME="linkura-motion-cli"
        
        # 创建临时目录
        TEMP_DIR=$(mktemp -d)
        
        echo "下载 linkura-motion-cli..."
        curl -L "$TOOL_URL" -o "$TEMP_DIR/linkura-motion-cli.tar.gz"
        
        echo "解压 linkura-motion-cli..."
        tar -xzf "$TEMP_DIR/linkura-motion-cli.tar.gz" -C "$TEMP_DIR"
        chmod +x "$TEMP_DIR/$TOOL_NAME"
        
        echo "上传 client-res.json 到 R2..."
        if [ -f "data/client-res.json" ]; then
          # 使用linkura-motion-cli上传文件
          # 参数说明: -p 指定项目类型，-f 指定文件路径，-c 指定并发数
          "$TEMP_DIR/$TOOL_NAME" upload -p client-res -f "data/client-res.json" -c 1
          echo "✅ client-res.json 已成功上传到 R2"
        else
          echo "❌ 错误: data/client-res.json 文件不存在"
          exit 1
        fi
        
        echo "上传 client-ios-res.json 到 R2..."
        if [ -f "data/client-ios-res.json" ]; then
          "$TEMP_DIR/$TOOL_NAME" upload -p client-ios-res -f "data/client-ios-res.json" -c 1
          echo "✅ client-ios-res.json 已成功上传到 R2"
        else
          echo "❌ 错误: data/client-ios-res.json 文件不存在"
          exit 1
        fi
        
        # 清理临时文件
        rm -rf "$TEMP_DIR"
        
        echo "上传任务完成"

  notification:
    runs-on: ubuntu-latest
    needs: check-res-version
    if: ${{ success() && needs.check-res-version.outputs.new_version == 'true' }}
    
    steps:
    - name: Send notification
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        QQ_BOT_URL: ${{ secrets.QQ_BOT_URL }}
        QQ_BOT_HOST: ${{ secrets.QQ_BOT_HOST }}
        GROUP_ID: ${{ secrets.GROUP_ID }}
        AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      run: |
        UPDATE_TYPE="${{ needs.check-res-version.outputs.update_type }}"
        CLIENT_VER="${{ needs.check-res-version.outputs.client_version }}"
        RES_VER="${{ needs.check-res-version.outputs.res_version }}"
        IOS_RES_VER="${{ needs.check-res-version.outputs.ios_res_version }}"
        OLD_CLIENT_VER="${{ needs.check-res-version.outputs.old_client_version }}"
        OLD_RES_VER="${{ needs.check-res-version.outputs.old_res_version }}"
        OLD_IOS_RES_VER="${{ needs.check-res-version.outputs.old_ios_res_version }}"
        
        # 构建变化显示文本
        OLD_CLIENT_DISPLAY="${OLD_CLIENT_VER:-未知}"
        NEW_CLIENT_DISPLAY="${CLIENT_VER:-未知}"
        OLD_RES_DISPLAY="${OLD_RES_VER:-未知}"
        NEW_RES_DISPLAY="${RES_VER:-未知}"
        OLD_IOS_RES_DISPLAY="${OLD_IOS_RES_VER:-未知}"
        NEW_IOS_RES_DISPLAY="${IOS_RES_VER:-未知}"

        CLIENT_CHANGE_LINE="🔄 客户端: ${OLD_CLIENT_DISPLAY} → ${NEW_CLIENT_DISPLAY}"
        CLIENT_CURRENT_LINE="🔄 客户端版本: ${NEW_CLIENT_DISPLAY}"
        RES_CURRENT_LINE="📦 Android 资源版本: ${NEW_RES_DISPLAY}"
        RES_CHANGE_LINE="📦 Android 资源: ${OLD_RES_DISPLAY} → ${NEW_RES_DISPLAY}"
        IOS_RES_CURRENT_LINE="🍎 iOS 资源版本: ${NEW_IOS_RES_DISPLAY}"
        IOS_RES_CHANGE_LINE="🍎 iOS 资源: ${OLD_IOS_RES_DISPLAY} → ${NEW_IOS_RES_DISPLAY}"

        # 根据更新类型构建消息：仅展示实际发生变化的项
        case "$UPDATE_TYPE" in
          "client+res")
            TG_MSG="🎉 Linkura 更新%0A%0A${CLIENT_CHANGE_LINE}%0A${RES_CHANGE_LINE}%0A${IOS_RES_CHANGE_LINE}"
            QQ_MSG="🎉 Linkura 更新\n\n${CLIENT_CHANGE_LINE}\n${RES_CHANGE_LINE}\n${IOS_RES_CHANGE_LINE}"
            ;;
          "client")
            TG_MSG="🎉 Linkura 更新%0A%0A${CLIENT_CHANGE_LINE}%0A${RES_CURRENT_LINE}%0A${IOS_RES_CURRENT_LINE}"
            QQ_MSG="🎉 Linkura 更新\n\n${CLIENT_CHANGE_LINE}\n${RES_CURRENT_LINE}\n${IOS_RES_CURRENT_LINE}"
            ;;
          "res")
            # 仅显示实际发生变化的平台资源版本
            RES_LINES=""
            RES_LINES_QQ=""
            if [ "$OLD_RES_VER" != "$RES_VER" ]; then
              RES_LINES="%0A${RES_CHANGE_LINE}"
              RES_LINES_QQ="\n${RES_CHANGE_LINE}"
            else
              RES_LINES="%0A${RES_CURRENT_LINE}"
              RES_LINES_QQ="\n${RES_CURRENT_LINE}"
            fi
            if [ "$OLD_IOS_RES_VER" != "$IOS_RES_VER" ]; then
              IOS_LINES="%0A${IOS_RES_CHANGE_LINE}"
              IOS_LINES_QQ="\n${IOS_RES_CHANGE_LINE}"
            else
              IOS_LINES="%0A${IOS_RES_CURRENT_LINE}"
              IOS_LINES_QQ="\n${IOS_RES_CURRENT_LINE}"
            fi
            TG_MSG="🎉 Linkura 更新%0A%0A${CLIENT_CURRENT_LINE}${RES_LINES}${IOS_LINES}"
            QQ_MSG="🎉 Linkura 更新\n\n${CLIENT_CURRENT_LINE}${RES_LINES_QQ}${IOS_LINES_QQ}"
            ;;
          *)
            TG_MSG="🎉 Linkura 更新%0A%0A✅ 检测到版本更新"
            QQ_MSG="🎉 Linkura 更新\n\n✅ 检测到版本更新"
            ;;
        esac

        if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
          TG_PREVIEW="${TG_MSG//%0A/$'\n'}"
          echo "🧪 Dry Run 模式：跳过真实通知发送"
          echo "Telegram 消息预览:"
          printf "%b\n" "$TG_PREVIEW"
          echo ""
          echo "QQ 消息预览:"
          printf "%b\n" "$QQ_MSG"
          exit 0
        fi
        
        echo "发送 Telegram 通知..."
        
        # 发送 Telegram 消息
        TG_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=${TG_MSG}")
        
        if [ "$TG_HTTP_CODE" = "200" ]; then
          echo "✅ Telegram 通知发送成功"
        else
          echo "❌ Telegram 通知发送失败 (HTTP: $TG_HTTP_CODE)"
        fi
        
        echo ""
        echo "发送 QQ 通知..."
        
        # 发送 QQ 消息
        if [ -n "$QQ_BOT_URL" ] && [ -n "$GROUP_ID" ] && [ -n "$AUTH_TOKEN" ] && [ -n "$QQ_BOT_HOST" ]; then
          QQ_HTTP_CODE=$(curl -k -s -o /dev/null -w "%{http_code}" -X POST "${QQ_BOT_URL}/send_group_msg" \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Host: ${QQ_BOT_HOST}" \
            -d "{\"group_id\":\"${GROUP_ID}\",\"message\":[{\"type\":\"text\",\"data\":{\"text\":\"${QQ_MSG}\"}}]}")
          
          if [ "$QQ_HTTP_CODE" = "200" ]; then
            echo "✅ QQ 通知发送成功"
          else
            echo "❌ QQ 通知发送失败 (HTTP: $QQ_HTTP_CODE)"
          fi
        else
          echo "⚠️ QQ 通知配置不完整，跳过 QQ 通知"
        fi
